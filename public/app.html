<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReview AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0F172A',
                        primary: '#1E293B',
                        secondary: '#334155',
                        cta: '#22C55E',
                        text: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['"IBM Plex Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-text font-sans antialiased min-h-screen flex flex-col">
    <nav class="p-6 border-b border-secondary/50 flex justify-between items-center bg-primary/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i data-lucide="terminal-square" class="text-cta w-8 h-8"></i>
            <h1 class="text-2xl font-bold tracking-tight">CodeReview <span class="text-cta">AI</span></h1>
        </div>
        <div id="auth-section" class="flex gap-4">
            <!-- Auth buttons injected via JS -->
        </div>
    </nav>

    <main class="flex-grow container mx-auto p-6 max-w-7xl mt-4 flex flex-col lg:flex-row gap-8">
        <!-- Input Section -->
        <div class="flex-1 flex flex-col gap-4">
            <h2 class="text-xl font-semibold flex items-center gap-2">
                <i data-lucide="code"></i> Your Code
            </h2>
            <div class="relative flex-grow min-h-[500px]">
                <textarea id="code-input" class="w-full h-full bg-primary border border-secondary rounded-xl p-6 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-cta/50 resize-none transition-all duration-300 shadow-lg" placeholder="// Paste your code here for review..."></textarea>
                <div class="absolute bottom-4 right-4 flex gap-3">
                    <select id="language-select" class="bg-secondary text-text text-sm rounded-lg px-3 py-2 border border-secondary/50 focus:outline-none cursor-pointer">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="react">React/JSX</option>
                    </select>
                    <button id="submit-btn" class="bg-cta hover:bg-green-600 text-background font-bold py-2 px-6 rounded-lg transition-all duration-300 flex items-center gap-2 cursor-pointer shadow-lg shadow-cta/20 hover:shadow-cta/40 hover:-translate-y-0.5">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> Analyze
                    </button>
                </div>
            </div>
        </div>

        <!-- Output Section -->
        <div class="flex-1 flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <i data-lucide="file-check-2"></i> AI Feedback
                </h2>
                <span id="cache-badge" class="hidden text-xs bg-secondary px-3 py-1 rounded-md text-gray-300 flex items-center gap-1 shadow-inner border border-secondary">
                    <i data-lucide="zap" class="w-3 h-3 text-yellow-400"></i> Loaded from Cache
                </span>
            </div>
            
            <div id="feedback-container" class="bg-primary border border-secondary rounded-xl p-6 flex-grow overflow-auto min-h-[500px] max-h-[700px] shadow-lg relative">
                <!-- Empty State -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 opacity-50">
                    <i data-lucide="bot" class="w-16 h-16 mb-4"></i>
                    <p>Awaiting your code...</p>
                </div>

                <!-- Loading State (Skeleton) -->
                <div id="loading-state" class="hidden space-y-6">
                    <div class="animate-pulse flex space-x-4">
                        <div class="rounded-full bg-secondary h-10 w-10"></div>
                        <div class="flex-1 space-y-6 py-1">
                            <div class="h-2 bg-secondary rounded w-3/4"></div>
                            <div class="space-y-3">
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="h-2 bg-secondary rounded col-span-2"></div>
                                    <div class="h-2 bg-secondary rounded col-span-1"></div>
                                </div>
                                <div class="h-2 bg-secondary rounded"></div>
                                <div class="h-2 bg-secondary rounded w-5/6"></div>
                            </div>
                        </div>
                    </div>
                     <div class="animate-pulse space-y-4 mt-8">
                        <div class="h-4 bg-secondary rounded w-1/4"></div>
                        <div class="h-24 bg-secondary/50 rounded-lg"></div>
                    </div>
                </div>

                <!-- Results State -->
                <div id="results-state" class="hidden flex flex-col gap-6 feedback-content">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center">
        <div class="bg-primary border border-secondary rounded-2xl p-8 max-w-md w-full shadow-2xl scale-95 opacity-0 transition-all duration-300" id="auth-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-bold">Sign In</h2>
                <button id="close-modal" class="text-gray-400 hover:text-text cursor-pointer transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="auth-form" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Username</label>
                    <input type="text" id="username" class="w-full bg-background border border-secondary rounded-lg px-4 py-3 focus:outline-none focus:border-cta transition-colors" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Password</label>
                    <input type="password" id="password" class="w-full bg-background border border-secondary rounded-lg px-4 py-3 focus:outline-none focus:border-cta transition-colors" required>
                </div>
                <div id="auth-error" class="text-red-400 text-sm hidden bg-red-900/20 p-3 rounded-lg border border-red-500/20"></div>
                <button type="submit" class="w-full bg-cta hover:bg-green-600 text-background font-bold py-3 px-4 rounded-lg mt-4 transition-colors cursor-pointer shadow-lg shadow-cta/20">Submit</button>
            </form>
            <p class="text-center text-sm text-gray-400 mt-6 pt-6 border-t border-secondary/50">
                <span id="modal-switch-text">Don't have an account?</span> 
                <button id="switch-auth-mode" class="text-cta hover:underline font-medium cursor-pointer">Sign Up</button>
            </p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-24 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-xl shadow-2xl border">
        <!-- Content injected via JS -->
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
